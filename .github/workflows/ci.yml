name: Nix Config Validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify-bootstrap:
    name: Verify dotfiles bootstrap flow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify bootstrap and build-switch wiring
        run: ./scripts/ci-verify-bootstrap.sh

  # Fast evaluation on Linux — catches syntax errors, undefined variables, type errors
  # Both NixOS and Darwin configs can be *evaluated* on Linux (pure functional, no build)
  evaluate:
    name: Evaluate nix expressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate NixOS config (CI x86_64-linux)
        run: |
          nix eval .#nixosConfigurations.ci-x86_64-linux.config.system.build.toplevel.outPath \
            --override-input secrets path:./ci/stub-secrets

      - name: Evaluate Darwin config (aarch64-darwin)
        run: |
          nix eval .#darwinConfigurations.aarch64-darwin.system.outPath \
            --override-input secrets path:./ci/stub-secrets

  # Full NixOS build on Linux — runs on every PR
  # nix build actually assembles the system closure; catches broken packages and
  # home-manager activation errors that nix eval misses.
  # Packages are fetched from cache.nixos.org so this is fast after the first run.
  build-nixos:
    name: Build NixOS configuration
    runs-on: ubuntu-latest
    needs: evaluate
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Build NixOS system (CI x86_64-linux)
        run: |
          nix build .#nixosConfigurations.ci-x86_64-linux.config.system.build.toplevel \
            --override-input secrets path:./ci/stub-secrets \
            --no-link \
            --print-build-logs

  # Full build on macOS — only on push to main (expensive runner)
  # Verifies derivations actually build, not just evaluate
  build-darwin:
    name: Build darwin configuration
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build Darwin config (aarch64-darwin)
        run: |
          nix build .#darwinConfigurations.aarch64-darwin.system \
            --override-input secrets path:./ci/stub-secrets \
            --no-link
